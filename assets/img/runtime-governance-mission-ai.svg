<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">Runtime governance architecture for mission AI</title>
  <desc id="desc">A runtime control plane connects mission policy, telemetry, human authorization, AI agents, data, tools, and tactical edge environments.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="control" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#184e77"/>
      <stop offset="100%" stop-color="#1f7a8c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#46616f"/>
    </marker>
  </defs>

  <rect width="1100" height="680" rx="28" fill="#f3f7fa"/>

  <rect x="60" y="62" width="980" height="556" rx="22" fill="url(#panel)" stroke="#c7d5dd" stroke-width="2"/>
  <text x="550" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#12323f">Runtime Governance for Mission AI</text>
  <text x="550" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#46616f">Policy, authority, telemetry, and AI behavior stay connected during live mission execution</text>

  <rect x="365" y="238" width="370" height="166" rx="18" fill="url(#control)" filter="url(#shadow)"/>
  <text x="550" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff">Runtime Control Plane</text>
  <text x="550" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#d9eef4">Context-aware authorization</text>
  <text x="550" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#d9eef4">Policy enforcement and action gating</text>

  <g font-family="Arial, sans-serif">
    <rect x="110" y="206" width="208" height="88" rx="14" fill="#ffffff" stroke="#9db3bf" stroke-width="2"/>
    <text x="214" y="244" text-anchor="middle" font-size="18" font-weight="700" fill="#16313d">Mission Policy</text>
    <text x="214" y="270" text-anchor="middle" font-size="13" fill="#516a76">Rules, thresholds, scope</text>

    <rect x="110" y="352" width="208" height="88" rx="14" fill="#ffffff" stroke="#9db3bf" stroke-width="2"/>
    <text x="214" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="#16313d">Human Authority</text>
    <text x="214" y="416" text-anchor="middle" font-size="13" fill="#516a76">Approval and override</text>

    <rect x="782" y="206" width="208" height="88" rx="14" fill="#ffffff" stroke="#9db3bf" stroke-width="2"/>
    <text x="886" y="244" text-anchor="middle" font-size="18" font-weight="700" fill="#16313d">Telemetry</text>
    <text x="886" y="270" text-anchor="middle" font-size="13" fill="#516a76">Audit, traces, evidence</text>

    <rect x="782" y="352" width="208" height="88" rx="14" fill="#ffffff" stroke="#9db3bf" stroke-width="2"/>
    <text x="886" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="#16313d">Data Trust</text>
    <text x="886" y="416" text-anchor="middle" font-size="13" fill="#516a76">Provenance and freshness</text>

    <rect x="263" y="500" width="246" height="82" rx="14" fill="#e8f5e9" stroke="#7fb685" stroke-width="2"/>
    <text x="386" y="536" text-anchor="middle" font-size="18" font-weight="700" fill="#214b28">AI Agents and Models</text>
    <text x="386" y="561" text-anchor="middle" font-size="13" fill="#3d6844">Recommend, reason, call tools</text>

    <rect x="591" y="500" width="246" height="82" rx="14" fill="#fff8e6" stroke="#d4a72c" stroke-width="2"/>
    <text x="714" y="536" text-anchor="middle" font-size="18" font-weight="700" fill="#5a4312">Tactical Edge</text>
    <text x="714" y="561" text-anchor="middle" font-size="13" fill="#715a22">Disconnected local enforcement</text>
  </g>

  <g fill="none" stroke="#46616f" stroke-width="2.8" marker-end="url(#arrow)">
    <path d="M318 250 C340 250 342 274 365 286"/>
    <path d="M318 396 C342 396 342 366 365 350"/>
    <path d="M735 286 C760 272 758 250 782 250"/>
    <path d="M735 350 C758 366 760 396 782 396"/>
    <path d="M479 500 C492 474 510 440 530 404"/>
    <path d="M621 404 C648 442 674 472 692 500"/>
  </g>

  <g fill="none" stroke="#7b8f99" stroke-width="2" stroke-dasharray="8 8">
    <path d="M386 500 C360 452 342 420 318 396"/>
    <path d="M714 500 C742 458 764 426 782 396"/>
  </g>

  <text x="550" y="635" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5c7280">Central authority, local enforcement, continuous accountability</text>
</svg>
