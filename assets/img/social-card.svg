    <text x="28" y="32" fill="#E6EDF3" font-family="JetBrains Mono, Consolas, monospace" font-size="18">DevSecOps</text>
    <rect x="212" width="132" height="48" rx="24" fill="none" stroke="#6EE7B7" opacity="0.55"/>
    <text x="240" y="32" fill="#E6EDF3" font-family="JetBrains Mono, Consolas, monospace" font-size="18">AI</text>
    <rect x="366" width="198" height="48" rx="24" fill="none" stroke="#38BDF8" opacity="0.55"/>
    <text x="394" y="32" fill="#E6EDF3" font-family="JetBrains Mono, Consolas, monospace" font-size="18">Architecture</text>
  </g>
