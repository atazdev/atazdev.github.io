<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ataz Labs social card</title>
  <desc id="desc">Dark technical journal card for Ataz Labs.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.62" stop-color="#111827"/>
      <stop offset="1" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6EE7B7"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#30363D" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#surface)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.75"/>
  <circle cx="1030" cy="96" r="260" fill="#38BDF8" opacity="0.08"/>
  <circle cx="104" cy="574" r="240" fill="#6EE7B7" opacity="0.06"/>
  <rect x="72" y="72" width="1056" height="486" rx="26" fill="#161B22" opacity="0.78" stroke="#30363D" stroke-width="2"/>
  <rect x="72" y="72" width="6" height="486" fill="url(#accent)"/>
  <text x="124" y="166" fill="#38BDF8" font-family="JetBrains Mono, Consolas, monospace" font-size="28" letter-spacing="4">TECHNICAL JOURNAL</text>
  <text x="124" y="272" fill="#E6EDF3" font-family="JetBrains Mono, Consolas, monospace" font-size="78" font-weight="700">Ataz Labs</text>
  <text x="128" y="346" fill="#8B949E" font-family="Inter, Arial, sans-serif" font-size="34">Secure systems, software delivery, and applied AI.</text>
  <g transform="translate(124 434)">
