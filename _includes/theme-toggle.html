<button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme" title="Switch between Tactical and Clinical modes">
  <span class="icon-tactical">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </span>
  <span class="icon-clinical" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
  </span>
</button>

<style>
.theme-toggle-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.5rem;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  margin-left: 1rem;
}

.theme-toggle-btn:hover {
  background: rgba(255,255,255,0.05);
  color: var(--accent-green);
  border-color: var(--accent-green);
}

:root.light-mode .theme-toggle-btn:hover {
  background: rgba(0,0,0,0.05);
  color: var(--accent-blue);
  border-color: var(--accent-blue);
}
</style>

<script>
(function() {
  const toggle = document.getElementById('theme-toggle');
  const iconTactical = toggle.querySelector('.icon-tactical');
  const iconClinical = toggle.querySelector('.icon-clinical');
  const root = document.documentElement;

  // Load preference
  const currentTheme = localStorage.getItem('theme') || 'tactical';
  if (currentTheme === 'clinical') {
    root.classList.add('light-mode');
    iconTactical.style.display = 'none';
    iconClinical.style.display = 'block';
  }

  toggle.addEventListener('click', () => {
    if (root.classList.contains('light-mode')) {
      root.classList.remove('light-mode');
      localStorage.setItem('theme', 'tactical');
      iconTactical.style.display = 'block';
      iconClinical.style.display = 'none';
    } else {
      root.classList.add('light-mode');
      localStorage.setItem('theme', 'clinical');
      iconTactical.style.display = 'none';
      iconClinical.style.display = 'block';
    }
  });
})();
</script>
